<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bosnia Lens</title>

    <!-- Primary Meta Tags -->
    <meta
      name="description"
      content="Free, open-source public data about Bosnia and Herzegovina. Browse postal codes and universities via REST API or interactive interface."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bosnia-lens.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bosnia-lens.netlify.app/" />
    <meta property="og:title" content="Bosnia Lens" />
    <meta
      property="og:description"
      content="Explore postal codes and universities in Bosnia and Herzegovina."
    />
    <meta
      property="og:image"
      content="https://bosnia-lens.netlify.app/og-image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bosnia Lens" />
    <meta
      name="twitter:description"
      content="Explore postal codes and universities in Bosnia and Herzegovina."
    />
    <meta
      name="twitter:image"
      content="https://bosnia-lens.netlify.app/og-image.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
